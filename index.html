<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jony Roy | JRN Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="loader-wrapper">
        <div class="main-container">
            <svg class="loader" viewBox="0 0 200 100">
                <path class="trace-bg" d="M20,50 L180,50"></path>
                <path class="trace-flow blue" d="M20,50 L180,50"></path>
                <rect class="chip-body" x="75" y="30" width="50" height="40" fill="#222" stroke="#444" rx="5" ry="5" />
                <text x="100" y="55" text-anchor="middle" fill="#00ccff" class="chip-text" style="font-size: 7px; font-family: Arial;">JRN</text>
            </svg>
        </div>
    </div>

    <div class="content">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <div class="avatar-glow"></div>
                    <img src="https://github.com/jony99jrn.png" alt="Jony Roy" class="avatar">
                </div>
                <h1>Hi, I'm <span class="highlight">Jony Roy</span></h1>
                <p class="intro-text">
                    If you want to connect with me, you can find me here.
                </p>
            </div>

            <div class="links-container">
                <a href="https://www.facebook.com/jony.99.jrn" target="_blank" class="link-item blue-border">
                    <i class="fab fa-facebook-f"></i>
                    <span>Facebook</span>
                </a>

                <a href="https://www.instagram.com/jony.99.jrn" target="_blank" class="link-item red-border">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>

                <a href="https://github.com/jony99jrn" target="_blank" class="link-item green-border">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>

                <a href="mailto:imjonyroy@gmail.com" class="link-item yellow-border">
                    <i class="fas fa-envelope"></i>
                    <span>Email Me</span>
                </a>
            </div>

            <div class="footer">
                <p>© 2026 JRN STUDIO</p>
            </div>
        </div>
    </div>

    <script>
        // Loader timeout
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }, 1500);
        });
    </script>
</body>
</html>

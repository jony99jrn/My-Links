<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRN STUDIO | Jony Roy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader-wrapper">
        <div class="main-container">
            <svg class="loader" viewBox="0 0 200 200">
                <path class="trace-bg" d="M20,100 L180,100"></path>
                <path class="trace-flow blue" d="M20,100 L180,100"></path>
                
                <line class="chip-pin" x1="85" y1="75" x2="85" y2="80" />
                <line class="chip-pin" x1="100" y1="75" x2="100" y2="80" />
                <line class="chip-pin" x1="115" y1="75" x2="115" y2="80" />
                <line class="chip-pin" x1="85" y1="120" x2="85" y2="125" />
                <line class="chip-pin" x1="100" y1="120" x2="100" y2="125" />
                <line class="chip-pin" x1="115" y1="120" x2="115" y2="125" />
                
                <rect class="chip-body" x="75" y="80" width="50" height="40" fill="#222" stroke="#444" />
                <text x="100" y="105" text-anchor="middle" fill="currentColor" class="chip-text blue" style="font-size: 8px;">JRN</text>
            </svg>
        </div>
    </div>

    <div class="content">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <div class="avatar-glow"></div>
                    <img src="https://github.com/jony99jrn.png" alt="Jony Roy" class="avatar">
                </div>
                <h1>Hi, I'm <span class="highlight">Jony Roy</span></h1>
                <p class="intro-text">Connect with me here:</p>
            </div>

            <div class="links-container">
                <a href="https://www.facebook.com/jony.99.jrn" target="_blank" class="link-item blue-border">
                    <i class="fab fa-facebook-f"></i> <span>Facebook</span>
                </a>
                <a href="https://www.instagram.com/jony.99.jrn" target="_blank" class="link-item red-border">
                    <i class="fab fa-instagram"></i> <span>Instagram</span>
                </a>
                <a href="https://github.com/jony99jrn" target="_blank" class="link-item green-border">
                    <i class="fab fa-github"></i> <span>GitHub</span>
                </a>
                <a href="mailto:imjonyroy@gmail.com" class="link-item yellow-border">
                    <i class="fas fa-envelope"></i> <span>Email</span>
                </a>
            </div>

            <h2 class="section-title">Projects</h2>
            <div class="projects-grid">
                <a href="Your Website Link" target="_blank" class="project-card">
                    <h3>Update Soon</h3>
                    <p>Web Design</p>
                </a>
                <a href="Your Website Link" target="_blank" class="project-card">
                    <h3>Update Soon</h3>
                    <p>App Tracker</p>
                </a>
            </div>

            <div class="footer">© 2026 Jony Roy</div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 800);
            }, 2000);
        });
    </script>
</body>
</html>
